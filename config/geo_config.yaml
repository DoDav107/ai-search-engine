openai:
  mode: live
  model: gpt-5.5
  max_completion_tokens: 500
  # GEO measurement needs more headroom: the reasoning model can spend the budget
  # reasoning and return empty content. Give measurement calls 2000 tokens and a low
  # reasoning effort so reasoning doesn't eat the answer.
  measurement_max_completion_tokens: 2000
  reasoning_effort: "low"
  max_calls_per_run: 50
  # The GEO advisory makes one large analytical call (assessment + four grounded
  # drafts). It needs a big token budget (smaller budgets truncate the JSON) and
  # takes longer than the 30s default request timeout, so allow more of both.
  advisory_max_completion_tokens: 3500
  advisory_timeout: 120

# Live web search for the GEO MEASUREMENT call only (Responses API + web_search tool,
# still model gpt-5.5). When enabled, the answer reflects what a browsing AI assistant
# actually returns, with citations captured per query. Toggle off to fall back to the
# plain chat-completions baseline (gpt-5.5 training knowledge) for comparison.
# These calls are agentic and slow, so the timeout is generous — a premature timeout
# returns empty and is recorded as an error (unscored), never a false zero.
web_search:
  enabled: true
  reasoning_effort: "low"      # start modest; raise if answers are thin
  max_output_tokens: 2000
  timeout: 180                 # generous — web search is agentic and slow

# Auto-extraction of rival brands surfaced in each AI answer. Runs a SECOND, separate
# call per query over the already-generated answer text (the measurement call is never
# changed). Brands are grounded strictly in the answer text, then brand_aliases are
# removed. Adds ~1 call per query, bounded by openai.max_calls_per_run.
competitor_extraction:
  enabled: true
  model: gpt-4o-mini
  max_completion_tokens: 300

# GEO quality scoring — how much each signal contributes to the per-query GEO score
# (0..100). The score is an explainable weighted average of six 0..1 components; tune
# these freely (they're normalized, so they need not sum to 1.0). A brand that is not
# mentioned scores 0 (visibility gates the quality signals).
scoring:
  visibility_weight: 0.35        # brand mentioned at all
  prominence_weight: 0.20        # how early the brand appears in the answer
  sentiment_weight: 0.15         # positive vs negative tone near the brand
  recommendation_weight: 0.15    # recommended/top option vs merely named
  citation_weight: 0.10          # answer includes source links
  accuracy_weight: 0.05          # answer is accurate about the brand (placeholder)
  neutral_accuracy_value: 0.5    # neutral value used while accuracy is not LLM-evaluated
  # Optional: if the brand is mentioned AND any of these terms appear in the answer,
  # accuracy is marked "accurate"; otherwise "unknown" (never guessed "inaccurate").
  accuracy_keywords: []
  # Sentiment is rule-based: positive/negative keywords near a brand mention. These
  # lists are config-editable (omit one to fall back to the built-in defaults).
  sentiment:
    positive: [recommended, recommend, "good choice", "great choice", leading, best,
               top, trusted, specialist, popular, reliable, excellent, ideal,
               favorite, favourite, go-to, preferred, "strong option", "industry leader"]
    negative: [limited, unknown, "not well-known", "not well known", "less established",
               lesser-known, "lesser known", poor, weak, obscure, unproven, outdated,
               lacking, niche]
    recommend: [best, top, leading, recommended, recommend, "top choice", ideal,
                go-to, "number one", "most popular"]
