# ============================================================================
# Consumer-facing AI model catalogue for the New Audit "AI model" dropdown.
# SINGLE SOURCE OF TRUTH shared by BOTH dashboards (Streamlit + Next.js), read via
# src/agents/geo_agent.build_catalog (Streamlit → geo_options; Next.js → /api/audit/options).
#
# WHY THIS EXISTS
#   The dropdown shows the models a real person recognises in ChatGPT / Gemini / Claude —
#   NOT the raw provider /models API dump (which is full of dated snapshots, codex, nano,
#   embeddings, etc. that no normal user would pick). We curate the short consumer list here.
#
# ── HOW TO KEEP THIS CURRENT (the whole maintenance story) ──────────────────
#   A provider launched / renamed / retired a model? Edit THIS FILE ONLY — no code changes,
#   no per-surface edits. For each model:
#       label:  the consumer name as shown in the product's own model picker (what users see)
#       api_id: the exact model id the API expects (what we actually call under the hood)
#       grounding: true if this model answers with live web search (GEO grounding applies);
#                  false marks it in the dropdown as "(no GEO grounding)".
#       default: true on ONE model per provider = the flagship pre-selected in the dropdown.
#   Confirm api_id strings on each provider's models page:
#     OpenAI     https://platform.openai.com/docs/models
#     Anthropic  https://docs.anthropic.com/en/docs/about-claude/models
#     Google     https://ai.google.dev/gemini-api/docs/models
#     xAI        https://docs.x.ai/docs/models
#     DeepSeek   https://api-docs.deepseek.com
#     Perplexity https://docs.perplexity.ai/getting-started/models
#   The dropdown renders `label`; the audit submits `api_id`. If a provider later rejects a
#   retired api_id at run time, the run fails with a clear "update config/models.yaml"
#   message (see src/clients/openai_client.py) — staleness surfaces loudly, never as a 0%.
# ============================================================================

default_provider: openai

providers:
  # -- OpenAI (ChatGPT) --------------------------------------------------------
  openai:
    models:
      - { label: "GPT-5.5",           api_id: "gpt-5.5", grounding: true, default: true }
      - { label: "GPT-5.2",           api_id: "gpt-5.2", grounding: true }
      - { label: "GPT-4o",            api_id: "gpt-4o",  grounding: true }
      - { label: "o3 (reasoning)",    api_id: "o3",      grounding: false }

  # -- Anthropic (Claude) ------------------------------------------------------
  anthropic:
    models:
      - { label: "Claude Opus 4.8",   api_id: "claude-opus-4-8",   grounding: true, default: true }
      - { label: "Claude Sonnet 4.6", api_id: "claude-sonnet-4-6", grounding: true }

  # -- Google (Gemini) ---------------------------------------------------------
  google:
    models:
      - { label: "Gemini 3 Pro",      api_id: "gemini-3-pro",     grounding: true, default: true }
      - { label: "Gemini 2.5 Flash",  api_id: "gemini-2.5-flash", grounding: true }

  # -- xAI (Grok) --------------------------------------------------------------
  xai:
    models:
      - { label: "Grok 4",            api_id: "grok-4", grounding: true, default: true }
      - { label: "Grok 3",            api_id: "grok-3", grounding: true }

  # -- Perplexity --------------------------------------------------------------
  perplexity:
    models:
      - { label: "Sonar",             api_id: "sonar",     grounding: true, default: true }
      - { label: "Sonar Pro",         api_id: "sonar-pro", grounding: true }

  # -- DeepSeek (no web search — GEO grounding never applies) -------------------
  deepseek:
    models:
      - { label: "DeepSeek-V3",       api_id: "deepseek-chat",     grounding: false, default: true }
      - { label: "DeepSeek-R1",       api_id: "deepseek-reasoner", grounding: false }
