  enabled: true
  model: gpt-4o-mini
  max_completion_tokens: 300
scoring:
  visibility_weight: 0.35
  prominence_weight: 0.2
  sentiment_weight: 0.15
  recommendation_weight: 0.15
  citation_weight: 0.1
  accuracy_weight: 0.05
  accuracy_unknown_score: 0.5
  accuracy_keywords: []
client: Eloize
