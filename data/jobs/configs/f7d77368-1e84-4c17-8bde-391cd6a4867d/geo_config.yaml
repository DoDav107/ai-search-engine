engine: live
brand: Nandos
brand_aliases:
- Nandos
competitors: []
geo:
  default_provider: openai
  default_model: gpt-5.5
  providers:
    openai:
      label: OpenAI
      env_key_name: OPENAI_API_KEY
      models:
      - id: gpt-5.5
        label: GPT-5.5
      - id: gpt-4.1
        label: GPT-4.1
      - id: gpt-4o
        label: GPT-4o
    anthropic:
      label: Claude
      env_key_name: ANTHROPIC_API_KEY
      models:
      - id: claude-sonnet-4
        label: Claude Sonnet 4
      - id: claude-opus-4
        label: Claude Opus 4
    perplexity:
      label: Perplexity
      env_key_name: PERPLEXITY_API_KEY
      models:
      - id: sonar
        label: Sonar
      - id: sonar-pro
        label: Sonar Pro
    mock:
      label: Mock / Demo
      env_key_name: null
      models:
      - id: mock-default
        label: Mock default
engines:
- provider: openai
  model: gpt-5.5
  enabled: true
queries:
- What are the best chicken restaurants near me?
- Best peri-peri chicken restaurants in Australia?
- Where can I get good grilled chicken for lunch?
- What are the best fast casual restaurants for chicken?
- Best takeaway chicken restaurants near me?
- Which restaurants are known for spicy grilled chicken?
- Where should I eat if I want healthy takeaway chicken?
- Best restaurants for Portuguese-style chicken?
- What are the best chicken burger restaurants?
- Best casual restaurants for dinner with friends?
openai:
  mode: live
  model: gpt-5.5
  max_completion_tokens: 500
  measurement_max_completion_tokens: 2000
  reasoning_effort: low
  max_calls_per_run: 50
  advisory_max_completion_tokens: 3500
  advisory_timeout: 120
web_search:
  enabled: true
  reasoning_effort: low
  max_output_tokens: 2000
  timeout: 180
competitor_extraction:
  enabled: true
  model: gpt-4o-mini
  max_completion_tokens: 300
scoring:
  visibility_weight: 0.35
  prominence_weight: 0.2
  sentiment_weight: 0.15
  recommendation_weight: 0.15
  citation_weight: 0.1
  accuracy_weight: 0.05
  accuracy_unknown_score: 0.5
  accuracy_keywords: []
client: Nandos
audit_settings:
  client: Nandos
  brand: Nandos
  domain: https://www.nandos.com.au/?gad_source=1&gad_campaignid=15266111268&gbraid=0AAAAAoQuyQFUoyYM_zxo5w-kkGNb-XWJI&gclid=Cj0KCQjwo_PRBhDNARIsAEcVALWKjh-Ae8_ZoeNlFPtLvmdo7AXUdnk8CppUOrM-PqqbRagMfNVktTQaAoDvEALw_wcB
  geo_provider: openai
  geo_model: gpt-5.5
  api_key_source: env
